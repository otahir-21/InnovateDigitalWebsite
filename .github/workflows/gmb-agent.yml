name: GMB Post & Review Agent

on:
  schedule:
    # Tuesday 5AM UTC = 9AM Dubai (GMT+4)
    - cron: "0 5 * * 2"
    # Friday 5AM UTC = 9AM Dubai (GMT+4)
    - cron: "0 5 * * 5"
  workflow_dispatch:

jobs:
  gmb-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: seo-agent/package-lock.json

      - name: Install dependencies
        run: cd seo-agent && npm install

      - name: Run GMB agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GMB_ACCOUNT_ID: ${{ secrets.GMB_ACCOUNT_ID }}
          GMB_LOCATION_ID: ${{ secrets.GMB_LOCATION_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: cd seo-agent && npm run gmb
