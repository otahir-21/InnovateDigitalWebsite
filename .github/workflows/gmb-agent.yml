name: GMB Post & Review Agent

# Secrets: GitHub → Settings → Secrets and variables → Actions
#   GMB_CLIENT_ID, GMB_CLIENT_SECRET, GMB_REFRESH_TOKEN, GMB_ACCOUNT_ID, GMB_LOCATION_ID
# invalid_grant fix: rotate client secret if needed, run `npx tsx gmb-oauth-setup.ts` locally,
# update GMB_REFRESH_TOKEN (+ GMB_CLIENT_SECRET) in Actions secrets.

on:
  schedule:
    # Tuesday 5AM UTC = 9AM Dubai (GMT+4)
    - cron: "0 5 * * 2"
    # Friday 5AM UTC = 9AM Dubai (GMT+4)
    - cron: "0 5 * * 5"
  workflow_dispatch:

jobs:
  gmb-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: seo-agent/package-lock.json

      - name: Install dependencies
        run: cd seo-agent && npm install

      - name: Run GMB agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMB_CLIENT_ID: ${{ secrets.GMB_CLIENT_ID }}
          GMB_CLIENT_SECRET: ${{ secrets.GMB_CLIENT_SECRET }}
          GMB_REFRESH_TOKEN: ${{ secrets.GMB_REFRESH_TOKEN }}
          GMB_ACCOUNT_ID: ${{ secrets.GMB_ACCOUNT_ID }}
          GMB_LOCATION_ID: ${{ secrets.GMB_LOCATION_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: cd seo-agent && npm run gmb
