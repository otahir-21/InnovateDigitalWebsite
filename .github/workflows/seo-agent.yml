name: Daily SEO Audit & Fix

on:
  schedule:
    # 3AM UTC = 7AM Dubai (GMT+4)
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check ANTHROPIC_API_KEY
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "❌ ANTHROPIC_API_KEY secret is not set"
            exit 1
          fi
          echo "✅ ANTHROPIC_API_KEY is set"

      - name: Install SEO agent dependencies
        run: |
          cd seo-agent
          npm install

      - name: Run smart SEO agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          cd seo-agent
          npm run smart-seo 2>&1 | tee ../seo-agent-log.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            cat ../seo-agent-log.txt
            exit 1
          fi

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push SEO fixes to staging
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Innovate Digital SEO Bot"
          git config user.email "seo-bot@innovatedigital.ae"

          # Always base staging off latest main to avoid drift
          git fetch origin
          git checkout -B staging origin/main

          git add -A
          git commit -m "seo: daily audit fixes $(date '+%Y-%m-%d')"

          # Push to staging — validate-and-deploy.yml runs tsc + build,
          # then merges into main only if the build passes.
          git push origin staging --force-with-lease
          echo "✅ SEO fixes pushed to staging — build validation will run next"

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "ℹ️  No SEO changes made today"
